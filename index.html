<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>韋杰本本</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --primary: #1a9c39; --water: #00BFFF; --bg: #000; --card: #1a1a1a; --text: #f5f5f5; --wave: rgba(135, 206, 250, 0.4); }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 20px 20px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; overscroll-behavior-y: contain; }
    .app-card { background: var(--card); width: 100%; max-width: 450px; border-radius: 24px; padding: 25px; box-sizing: border-box; border: 1px solid #333; margin-top: 10px; position: relative; }
    h1 { font-size: 28px; margin: 0 0 15px; text-align: center; }
    .title-water { color: var(--water); margin: 0 5px; }
    .title-text { color: var(--primary); font-weight: bold; }
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; color: #888; }
    input[type="text"], input[type="number"], select { width: 100%; background: #222; border: 1px solid #444; padding: 14px; border-radius: 12px; color: #fff; font-size: 16px; box-sizing: border-box; }
    input:focus, select:focus { border-color: var(--primary); outline: none; }
    input[list]::-webkit-calendar-picker-indicator { display: none !important; }
    input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
    .photo-btn { background: #333; border: 2px dashed #555; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
    .photo-btn:active { background: #444; }
    .delete-icon { color: #1A365D; font-size: 18px; cursor: pointer; padding-left: 15px; }
    #submit-btn { background: var(--primary); color: #fff; width: 100%; padding: 18px; border-radius: 50px; border: none; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; position: relative; overflow: hidden; }
    #submit-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
    .ripple { position: absolute; background: var(--wave); border-radius: 50%; transform: scale(0); animation: ripple-animation 0.6s linear; pointer-events: none; }
    @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }
    #status { margin-top: 15px; text-align: center; font-size: 14px; min-height: 20px; color: var(--primary); white-space: pre-line; line-height: 1.5; }
    #preview { max-width: 100%; margin-top: 10px; border-radius: 8px; display: none; border: 1px solid #444; }
    #history-section { margin-top: 20px; border-top: 1px dashed #444; padding-top: 15px; width: 100%; }
    #history-list { max-height: 250px; overflow-y: auto; }
    .history-item { background: #222; padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); font-size: 14px; }
    .history-item .time { color: #888; font-size: 11px; margin-top: 3px; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.2s; }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal-content { background: var(--card); border: 1px solid #444; border-radius: 20px; padding: 25px; width: 80%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transform: scale(0.9); transition: transform 0.2s; }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
    .modal-text { color: #ccc; font-size: 15px; margin-bottom: 25px; line-height: 1.5; word-break: break-all; }
    .modal-actions { display: flex; gap: 15px; }
    .modal-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-cancel { background: #333; color: #fff; }
    .btn-confirm { background: #1A365D; color: #fff; }
  </style>
</head>
<body>
  <div class="app-card">
    <h1><span class="title-water">💧</span><span class="title-text">韋杰本本</span><span class="title-water">💧</span></h1>
    <form id="payForm">
      <div class="input-group">
        <label>交易時間</label>
        <div style="position: relative;">
          <input type="text" id="time-display" readonly style="cursor: pointer;">
          <input type="datetime-local" id="time-input" name="time" required onchange="updateTimeDisplay()" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; border: none; padding: 0;">
        </div>
      </div>

      <div class="input-group">
        <label>交易類別</label>
        <select name="type" id="type-selector">
          <option value="支出">🌱 支出</option>
          <option value="收入">🌊 收入</option>
          <option value="墊付">⚖️ 分帳 / 墊付</option>
        </select>
      </div>
      <div class="input-group"><label>項目內容</label><input type="text" name="item" list="item-list" placeholder="如：飲料、盆栽、加油" autocomplete="off" required><datalist id="item-list"></datalist></div>
      
      <div class="input-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
          <label style="margin:0;">金額 (總額)</label>
          <label style="margin:0; color:var(--primary); font-size:12px; cursor:pointer;"><input type="checkbox" id="currency-toggle"> 外幣模式</label>
        </div>
        <input type="text" id="amount-input" name="amount" inputmode="decimal" placeholder="如：999 或 1689" required autocomplete="off">
      </div>

      <div id="split-group" style="display: none; flex-direction: column; gap: 15px;" class="input-group">
        <div style="display: flex; gap: 15px;">
          <div style="flex: 1;">
            <label>是誰先買單的？(H欄)</label>
            <input type="text" id="main-payer" name="payer" value="Luke" list="payer-list" autocomplete="off" onfocus="if(this.value==='Luke') this.value='';" onblur="if(this.value.trim()==='') this.value='Luke';">
          </div>
          <div style="flex: 1;">
            <label>幫幾個人墊付？</label>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 4px;">
              <button type="button" onclick="adjustSplitCount(-1)" style="background: #333; color: white; border: none; border-radius: 8px; width: 30px; height: 35px; font-weight: bold; cursor: pointer;">-</button>
              <input type="number" id="split-count" value="1" min="1" max="10" readonly style="flex: 1; text-align: center; background: #222; border: 1px solid #444; color: white; font-size: 16px; border-radius: 8px; height: 35px; box-sizing: border-box;">
              <button type="button" onclick="adjustSplitCount(1)" style="background: #333; color: white; border: none; border-radius: 8px; width: 30px; height: 35px; font-weight: bold; cursor: pointer;">+</button>
            </div>
          </div>
        </div>
        <div id="split-fields-container"></div>
        <div id="split-summary" style="font-size: 13px; font-weight: bold; text-align: right; margin-top: -5px; transition: color 0.3s;"></div>
      </div>

      <div class="input-group">
        <label>付款
