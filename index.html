<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.png">
  <meta name="theme-color" content="#D35400">
  
  <title>曜明精算</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* 🔥 五行火土配色設定 */
    :root { 
      --primary: #D35400; 
      --accent: #F1C40F;
      --bg: #12100E;
      --card: #1A1816;
      --text: #F5F5F5; 
      --wave: rgba(211, 84, 0, 0.4); 
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 20px 20px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; overscroll-behavior-y: contain; }
    .app-card { background: var(--card); width: 100%; max-width: 450px; border-radius: 24px; padding: 25px; box-sizing: border-box; border: 1px solid #332B25; margin-top: 10px; position: relative; }
    h1 { font-size: 28px; margin: 0 0 15px; text-align: center; }
    .title-icon { color: var(--primary); margin: 0 5px; }
    .title-text { color: var(--accent); font-weight: bold; }
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; color: #999; }
    
    input[type="text"], input[type="number"], input[type="datetime-local"], select { width: 100%; background: #24211E; border: 1px solid #4A3E35; padding: 14px; border-radius: 12px; color: #fff; font-size: 16px; box-sizing: border-box; }
    input:focus, select:focus { border-color: var(--primary); outline: none; }
    input[list]::-webkit-calendar-picker-indicator { display: none !important; }
    input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
    .photo-btn { background: #2E2925; border: 2px dashed #5A4E45; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
    .photo-btn:active { background: #4A3E35; }
    
    .action-icons { display: flex; align-items: center; gap: 15px; }
    .edit-icon { color: #888; font-size: 16px; cursor: pointer; transition: color 0.2s; }
    .edit-icon:active { color: var(--accent); }
    .delete-icon { color: #5C4033; font-size: 18px; cursor: pointer; }

    #submit-btn { background: var(--primary); color: #fff; width: 100%; padding: 18px; border-radius: 50px; border: none; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; position: relative; overflow: hidden; transition: background 0.3s; }
    #submit-btn:disabled { background: #4A3E35 !important; color: #888; cursor: not-allowed; }
    .ripple { position: absolute; background: var(--wave); border-radius: 50%; transform: scale(0); animation: ripple-animation 0.6s linear; pointer-events: none; }
    @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }
    
    #status { margin-top: 15px; text-align: center; font-size: 14px; min-height: 20px; color: var(--accent); white-space: pre-line; line-height: 1.5; }
    #preview { max-width: 100%; margin-top: 10px; border-radius: 8px; display: none; border: 1px solid #4A3E35; }
    #history-section { margin-top: 20px; border-top: 1px dashed #4A3E35; padding-top: 15px; width: 100%; }
    
    #history-list { max-height: 550px; overflow-y: auto; padding-right: 5px; }
    
    .history-item { background: #24211E; padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); font-size: 14px; }
    .history-item .time { color: #888; font-size: 11px; margin-top: 3px; }
    
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.2s; }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal-content { background: var(--card); border: 1px solid #4A3E35; border-radius: 20px; padding: 25px; width: 80%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.9); transform: scale(0.9); transition: transform 0.2s; }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
    .modal-text { color: #ccc; font-size: 15px; margin-bottom: 25px; line-height: 1.5; word-break: break-all; }
    .modal-actions { display: flex; gap: 15px; }
    .modal-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-cancel { background: #333; color: #fff; }
    .btn-confirm { background: #A04000; color: #fff; }
  </style>
</head>
<body>
  <div class="app-card">
    <h1><span class="title-icon">🔥</span><span class="title-text">曜明精算</span><span class="title-icon">🔥</span></h1>
    <form id="payForm">
      <div class="input-group">
        <label>交易時間</label>
        <div style="position: relative;">
          <input type="text" id="time-display" readonly style="cursor: pointer;">
          <input type="datetime-local" id="time-input" name="time" required onchange="updateTimeDisplay()" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; border: none; padding: 0;">
        </div>
      </div>

      <div class="input-group">
        <label>交易類別</label>
        <select name="type" id="type-selector">
          <option value="支出">🔥 支出</option>
          <option value="收入">💎 收入</option>
          <option value="墊付">⚖️ 分帳 / 墊付</option>
        </select>
      </div>
      <div class="input-group"><label>項目內容</label><input type="text" name="item" list="item-list" placeholder="如：好市多、加油" autocomplete="off" required><datalist id="item-list"></datalist></div>
      
      <div class="input-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
          <label style="margin:0;">金額 (總額)</label>
          <label style="margin:0; color:var(--accent); font-size:12px; cursor:pointer;"><input type="checkbox" id="currency-toggle"> 外幣模式</label>
        </div>
        <input type="text" id="amount-input" name="amount" inputmode="decimal" placeholder="如：999 或 1689" required autocomplete="off">
      </div>

      <div id="split-group" style="display: none; flex-direction: column; gap: 15px;" class="input-group">
        <div style="display: flex; gap: 15px;">
          <div style="flex: 1;">
            <label>是誰先買單的？</label>
            <input type="text" id="main-payer" name="payer" value="Steve" list="payer-list" autocomplete="off" onfocus="if(this.value==='Steve') this.value='';" onblur="if(this.value.trim()==='') this.value='Steve';">
          </div>
          <div style="flex: 1;">
            <label>幫幾個人墊付？</label>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 4px;">
              <button type="button" onclick="adjustSplitCount(-1)" style="background: #2E2925; color: white; border: 1px solid #5A4E45; border-radius: 8px; width: 30px; height: 35px; font-weight: bold; cursor: pointer;">-</button>
              <input type="number" id="split-count" value="1" min="1" max="10" readonly style="flex: 1; text-align: center; background: #24211E; border: 1px solid #4A3E35; color: white; font-size: 16px; border-radius: 8px; height: 35px; box-sizing: border-box;">
              <button type="button" onclick="adjustSplitCount(1)" style="background: #2E2925; color: white; border: 1px solid #5A4E45; border-radius: 8px; width: 30px; height: 35px; font-weight: bold; cursor: pointer;">+</button>
            </div>
          </div>
        </div>
        <div id="split-fields-container"></div>
        <div id="split-summary" style="font-size: 13px; font-weight: bold; text-align: right; margin-top: -5px; transition: color 0.3s;"></div>
      </div>

      <div class="input-group">
        <label>付款方式</label>
        <input type="text" id="payment-input" name="payment" list="payment-list" placeholder="未填預設為現金" autocomplete="off">
        <datalist id="payment-list"></datalist>
      </div>
      
      <div class="input-group">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 6px;">
          <label style="margin: 0;">照片附件 <span style="color:#888;font-size:11px;">(編輯模式下未選則保留舊圖)</span></label>
          <span id="photo-label" style="font-size: 12px; color: var(--primary);">未選擇</span>
        </div>
        <div style="display: flex; gap: 10px;">
          <div class="photo-btn" style="flex: 1; height: 75px;" onclick="document.getElementById('photoInputCamera').click()">
            <i class="fa-solid fa-camera" style="font-size: 18px; margin-bottom: 5px;"></i>
            <span style="font-size: 13px;">直接拍照</span>
          </div>
          <div class="photo-btn" style="flex: 1; height: 75px;" onclick="document.getElementById('photoInputGallery').click()">
            <i class="fa-regular fa-image" style="font-size: 18px; margin-bottom: 5px;"></i>
            <span style="font-size: 13px;">相簿選取</span>
          </div>
        </div>
        <input type="file" id="photoInputCamera" accept="image/*" capture="camera" style="display:none" onchange="previewAndCompressImage(this)">
        <input type="file" id="photoInputGallery" accept="image/*" style="display:none" onchange="previewAndCompressImage(this)">
        <img id="preview">
      </div>

      <div class="input-group"><label>備註</label><input type="text" name="note" placeholder="補充細節..."></div>
      <button type="button" id="submit-btn" onclick="createRipple(event); uploadData();">確認送出資料</button>
      <div id="status"></div>
    </form>
    <div id="history-section"><div style="color: #888; font-size: 12px; margin-bottom: 10px;">🔥 歷史紀錄 (向下捲動載入更早紀錄)</div><div id="history-list"></div></div>
  </div>

  <div id="custom-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-title"><span class="title-icon">🔥</span><span class="title-text">系統提示</span><span class="title-icon">🔥</span></div>
      <div class="modal-text" id="modal-desc">確定要刪除這筆紀錄嗎？</div>
      <div class="modal-actions">
        <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="modal-btn btn-confirm" id="confirm-delete-btn">確定刪除</button>
      </div>
    </div>
  </div>

  <datalist id="payer-list"></datalist>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxtlwgM1KT4-04Kj-ZDZX8RydsZITmcFgrkiVNFEvHDknCJedRqT9gsx7GySWUS-BuJ/exec";
    
    window.historyData = []; 
    let historyOffset = 0;
    let isLoadingHistory = false;
    let hasMoreHistory = true;

    function callAPI(a, d) { 
      return fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ source: 'webapp', action: a, data: d || {} }) }); 
    }
    
    function createRipple(e) {
      const b = e.currentTarget, r = document.createElement("span"), d = Math.max(b.clientWidth, b.clientHeight), rad = d/2;
      r.style.width = r.style.height = `${d}px`; r.style.left = `${e.clientX - b.offsetLeft - rad}px`; r.style.top = `${e.clientY - b.offsetTop - rad}px`;
      r.className = "ripple"; const old = b.getElementsByClassName("ripple")[0]; if(old) old.remove(); b.appendChild(r);
    }

    function updateTimeDisplay() {
      const val = document.getElementById('time-input').value;
      if(val) document.getElementById('time-display').value = val.replace('T', ' ').replace(/-/g, '/');
    }

    function setCurrentTime() {
      const now = new Date();
      const y = now.getFullYear(), m = String(now.getMonth() + 1).padStart(2, '0'), d = String(now.getDate()).padStart(2, '0');
      const hh = String(now.getHours()).padStart(2, '0'), mm = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('time-input').value = `${y}-${m}-${d}T${hh}:${mm}`;
      document.getElementById('time-display').value = `${y}/${m}/${d} ${hh}:${mm}`;
    }

    window.onload = function() { setCurrentTime(); refreshCloudHistory(); loadAutocomplete(); };

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && !document.getElementById('submit-btn').dataset.editRow) {
        setCurrentTime();
      }
    });

    function refreshCloudHistory() { 
      historyOffset = 0;
      hasMoreHistory = true;
      document.getElementById('history-list').innerHTML = '<div style="text-align:center; padding:10px; color:#888; font-size:12px;">載入中...</div>';
      callAPI('getHistory', {offset: 0}).then(res => res.json()).then(h => {
        window.historyData = h; 
        renderHistoryList(h, true);
        if (h.length < 20) hasMoreHistory = false;
      }).catch(e => console.error("History error:", e));
    }

    function loadMoreHistory() {
      if (isLoadingHistory || !hasMoreHistory) return;
      isLoadingHistory = true;
      historyOffset += 20;
      
      const list = document.getElementById('history-list');
      const loadingDiv = document.createElement('div');
      loadingDiv.id = 'history-loading';
      loadingDiv.style = "text-align:center; padding:10px; color:#888; font-size:12px;";
      loadingDiv.innerText = "載入更早的紀錄...";
      list.appendChild(loadingDiv);

      callAPI('getHistory', {offset: historyOffset}).then(res => res.json()).then(h => {
        document.getElementById('history-loading')?.remove();
        if (h.length === 0) {
          hasMoreHistory = false;
        } else {
          window.historyData = window.historyData.concat(h);
          renderHistoryList(h, false);
          if (h.length < 20) hasMoreHistory = false;
        }
        isLoadingHistory = false;
      }).catch(e => {
        console.error("History error:", e);
        document.getElementById('history-loading')?.remove();
        isLoadingHistory = false;
      });
    }

    function renderHistoryList(data, clear) {
      const list = document.getElementById('history-list');
      const html = data.map(x => `
        <div class="history-item">
          <div><span>${x.text}</span><div class="time">${x.timeStr}</div></div>
          <div class="action-icons">
            <i class="fa-solid fa-pen edit-icon" onclick="editRecord(${x.rowNum})"></i>
            <i class="fa-solid fa-trash-can delete-icon" onclick="openDeleteModal(${x.rowNum}, '${x.text.split('：')[0]}')"></i>
          </div>
        </div>`).join('');
      if (clear) list.innerHTML = html || '暫無資料';
      else list.innerHTML += html;
    }

    document.getElementById('history-list').addEventListener('scroll', function() {
      if (this.scrollTop + this.clientHeight >= this.scrollHeight - 10) {
        loadMoreHistory();
      }
    });

    function resetFormUI() {
      document.getElementById('payForm').reset();
      setCurrentTime(); 
      document.getElementById('split-count').value = "1";
      document.getElementById('split-fields-container').innerHTML = '';
      document.getElementById('split-summary').innerHTML = '';
      document.getElementById('split-group').style.display = 'none';
      document.getElementById('main-payer').value = "Steve";
      document.getElementById('currency-toggle').checked = false;
      document.getElementById('amount-input').setAttribute('inputmode', 'decimal');
      document.getElementById('amount-input').placeholder = '如：999 或 1689';
      document.getElementById('payment-input').placeholder = '未填預設為現金';
      currentPhoto = ""; document.getElementById('preview').src = "";
      document.getElementById('preview').style.display = 'none';
      document.getElementById('photo-label').innerText = "未選擇";
      
      const btn = document.getElementById('submit-btn');
      if (btn.dataset.editRow) {
        delete btn.dataset.editRow;
        btn.innerHTML = "確認送出資料";
        btn.style.background = "var(--primary)";
        const cancelBtn = document.getElementById('cancel-edit-btn');
        if(cancelBtn) cancelBtn.remove();
      }
    }

    function editRecord(rowNum) {
      const rec = window.historyData.find(x => x.rowNum === rowNum);
      if(!rec) return;
      const r = rec.rowData;

      const d = new Date(r[0]);
      if (!isNaN(d.getTime())) {
        const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
        const hh = String(d.getHours()).padStart(2,'0'), mm = String(d.getMinutes()).padStart(2,'0');
        document.getElementById('time-input').value = `${y}-${m}-${dd}T${hh}:${mm}`;
        updateTimeDisplay();
      }

      const type = r[1];
      document.getElementById('type-selector').value = (type === '純記帳') ? '墊付' : type;
      document.getElementById('payForm').item.value = r[2] ? r[2].toString().replace(/^'/, '') : '';
      document.getElementById('payment-input').value = r[4] || '';
      document.getElementById('main-payer').value = r[7] || 'Steve';
      
      let fullNote = r[5] ? r[5].toString().replace(/^'/, '') : '';
      let foreignMatch = fullNote.match(/外幣:\s*([0-9.]+)\s*([A-Z]+)/);
      if (foreignMatch) {
        document.getElementById('amount-input').value = foreignMatch[1] + foreignMatch[2];
        document.getElementById('currency-toggle').checked = true;
      } else {
        document.getElementById('amount-input').value = r[3] || '';
        document.getElementById('currency-toggle').checked = false;
      }

      let splits = [];
      for(let i=8; i<r.length; i++) {
        let cell = r[i] ? r[i].toString() : '';
        if(!cell) continue;
        let match2 = cell.match(/^(.*?)\(([0-9.]+)([A-Z]+)\/\$([0-9.]+)\)$/); 
        let match1 = cell.match(/^(.*?)\(\$([0-9.]+)\)$/); 
        if(match2) splits.push({name: match2[1].trim(), amt: match2[2]});
        else if(match1) splits.push({name: match1[1].trim(), amt: match1[2]});
      }
      
      document.getElementById('split-count').value = splits.length || 1;
      renderSplitFields();

      setTimeout(() => {
        for(let i=0; i<splits.length; i++) {
          let nInput = document.getElementById(`split-name-${i+1}`);
          let aInput = document.getElementById(`split-amount-${i+1}`);
          if(nInput) nInput.value = splits[i].name;
          if(aInput) { aInput.value = splits[i].amt; aInput.dataset.manual = 'true'; }
        }
        distributeAutoSplits();
      }, 50);

      const btn = document.getElementById('submit-btn');
      btn.innerHTML = `📝 更新資料 (覆蓋原紀錄)`;
      btn.style.background = 'var(--accent)';
      btn.dataset.editRow = rowNum;

      if(!document.getElementById('cancel-edit-btn')) {
        let cancelBtn = document.createElement('button');
        cancelBtn.id = 'cancel-edit-btn';
        cancelBtn.type = 'button';
        cancelBtn.innerText = '取消編輯';
        cancelBtn.style = 'background: #333; color: #fff; width: 100%; padding: 15px; border-radius: 50px; border: none; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer;';
        cancelBtn.onclick = () => { resetFormUI(); document.getElementById('status').innerText = "✔️ 已取消編輯"; };
        btn.parentNode.insertBefore(cancelBtn, btn.nextSibling);
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function loadAutocomplete() { 
      callAPI('getItems').then(res => res.json()).then(d => {
        if(d.items) document.getElementById('item-list').innerHTML = d.items.map(i => `<option value="${i}">`).join('');
        if(d.payers) document.getElementById('payer-list').innerHTML = d.payers.map(p => `<option value="${p}">`).join('');
        if(d.payments) document.getElementById('payment-list').innerHTML = d.payments.map(py => `<option value="${py}">`).join('');
      }).catch(e => console.error("Autocomplete error:", e));
    }

    function distributeAutoSplits() {
      const amountInput = document.getElementById('amount-input').value;
      const rawTotal = parseFloat(amountInput.replace(/[a-zA-Z]/g, '')) || 0;
      const count = parseInt(document.getElementById('split-count').value) || 1;

      let manualSum = 0, autoFields = [];
      for(let i=1; i<=count; i++) {
        let field = document.getElementById(`split-amount-${i}`);
        if(!field) continue;
        if(field.dataset.manual === "true" && field.value.trim() !== '') {
          manualSum += parseFloat(field.value) || 0;
          field.style.border = "2px solid var(--primary)";
        } else {
          autoFields.push(field);
          field.style.border = "1px solid #4A3E35";
        }
      }

      let remaining = Math.max(0, rawTotal - manualSum);
      if(autoFields.length > 0) {
        let baseVal = Math.floor(remaining / autoFields.length);
        autoFields.forEach((f, i) => {
          if (i === autoFields.length - 1) f.value = remaining - (baseVal * (autoFields.length - 1));
          else f.value = baseVal;
        });
      }
      calculateSplitSummary();
    }

    function calculateSplitSummary() {
      const amountInput = document.getElementById('amount-input').value;
      const rawTotal = parseFloat(amountInput.replace(/[a-zA-Z]/g, '')) || 0;
      let splitSum = 0;
      const count = parseInt(document.getElementById('split-count').value) || 1;
      for(let i=1; i<=count; i++) {
        const amtField = document.getElementById(`split-amount-${i}`);
        if(amtField && amtField.value !== '') splitSum += parseFloat(amtField.value) || 0;
      }
      const summaryDiv = document.getElementById('split-summary');
      if (Math.abs(splitSum - rawTotal) < 0.1) summaryDiv.innerHTML = `✅ 分配精準無誤！`, summaryDiv.style.color = 'var(--primary)';
      else if (splitSum > rawTotal) summaryDiv.innerHTML = `⚠️ 超出總額！`, summaryDiv.style.color = '#ff4d4d';
      else summaryDiv.innerHTML = `💡 目前加總：$${splitSum} | 剩餘：$${rawTotal - splitSum}`, summaryDiv.style.color = 'var(--accent)';
    }

    function adjustSplitCount(delta) {
      let input = document.getElementById('split-count');
      let newVal = Math.max(1, Math.min(10, parseInt(input.value) + delta));
      input.value = newVal; renderSplitFields();
    }

    function renderSplitFields() {
      const count = parseInt(document.getElementById('split-count').value) || 1;
      const container = document.getElementById('split-fields-container');
      let existing = [];
      for(let i=1; i<=10; i++) {
        let n = document.getElementById(`split-name-${i}`), a = document.getElementById(`split-amount-${i}`);
        if (n) existing[i] = { name: n.value, amount: a.value, manual: a.dataset.manual === "true" };
      }
      let html = '';
      for(let i=1; i<=count; i++) {
        let n = existing[i]?.name || (i === 1 ? "Steve" : "");
        let m = existing[i]?.manual || false;
        html += `
        <div style="display: flex; gap: 15px; margin-top: 10px;">
          <div style="flex: 1;"><label style="font-size:11px;">對象 ${i}</label><input type="text" id="split-name-${i}" value="${n}" list="payer-list" style="padding:10px;"></div>
          <div style="flex: 1;"><label style="font-size:11px;">金額 (自動平分)</label><input type="number" id="split-amount-${i}" value="${existing[i]?.amount || ''}" data-manual="${m}" oninput="this.dataset.manual='true'; distributeAutoSplits();" onblur="if(this.value===''){this.dataset.manual='false'; distributeAutoSplits();}" style="padding:10px;"></div>
        </div>`;
      }
      container.innerHTML = html;
      distributeAutoSplits();
    }
  </script>
</body>
</html>
