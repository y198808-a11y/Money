<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>雪球計畫 | 記帳小天使</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --primary: #deff9a; --bg: #000; --card: #1a1a1a; --text: #f5f5f5; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
    .app-card { background: var(--card); width: 100%; max-width: 450px; border-radius: 24px; padding: 30px; box-sizing: border-box; border: 1px solid #333; }
    h1 { font-size: 26px; margin: 0 0 20px; color: var(--primary); text-align: center; }
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 13px; color: #888; }
    input, select { width: 100%; background: #222; border: 1px solid #444; padding: 12px; border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; }
    #submit-btn { background: var(--primary); color: #000; width: 100%; padding: 15px; border-radius: 50px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    #status { margin-top: 15px; text-align: center; font-size: 14px; color: var(--primary); white-space: pre-line; }
    #history-list { margin-top: 20px; width: 100%; max-height: 200px; overflow-y: auto; font-size: 13px; }
    .history-item { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--primary); display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <div class="app-card">
    <h1><i class="fa-solid fa-seedling"></i> 記帳小天使</h1>
    <form id="payForm">
      <div class="input-group">
        <select name="type" id="type-selector">
          <option value="支出">📉 支出</option>
          <option value="收入">💰 收入</option>
          <option value="墊付">⚖️ 分帳/墊付</option>
        </select>
      </div>
      <div class="input-group"><input type="text" name="item" placeholder="項目內容" required></div>
      <div class="input-group"><input type="text" name="amount" placeholder="金額 (如: 5000JPY)" required></div>
      <div id="split-group" style="display: none; gap: 10px; margin-bottom:15px;">
        <input type="number" name="people" placeholder="人數" value="1">
        <input type="text" name="payer" placeholder="墊付人" value="自己">
      </div>
      <div class="input-group"><input type="text" name="payment" placeholder="付款方式 (預設現金)"></div>
      <div class="input-group">
        <div style="background:#333; padding:15px; border-radius:10px; text-align:center; cursor:pointer;" onclick="document.getElementById('photoInput').click()">📸 拍收據</div>
        <input type="file" id="photoInput" accept="image/*" capture="camera" style="display:none" onchange="compressImage(this)">
      </div>
      <button type="button" id="submit-btn" onclick="sendData()">送出紀錄</button>
      <div id="status"></div>
    </form>
    <div id="history-list"></div>
  </div>

  <script>
    // 🔥 重要：換成你的 GAS 網址
    const API_URL = "https://script.google.com/macros/s/AKfycbxtlwgM1KT4-04Kj-ZDZX8RydsZITmcFgrkiVNFEvHDknCJedRqT9gsx7GySWUS-BuJ/exec";

    function sendData() {
      const form = document.getElementById('payForm'), btn = document.getElementById('submit-btn'), status = document.getElementById('status');
      btn.disabled = true; status.innerText = "🚀 同步中...";
      
      const payload = {
        source: 'webapp', action: 'submit',
        data: {
          type: form.type.value, item: form.item.value, amount: form.amount.value,
          payment: form.payment.value, people: form.people.value, note: form.note.value,
          photoBase64: currentPhotoBase64
        }
      };

      fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(r => r.text()).then(msg => {
          status.innerText = msg; form.reset(); currentPhotoBase64 = "";
          btn.disabled = false; loadHistory();
        }).catch(e => { status.innerText = "連線失敗"; btn.disabled = false; });
    }

    function loadHistory() {
      fetch(API_URL, { method: 'POST', body: JSON.stringify({source:'webapp', action:'getHistory'}) })
        .then(r => r.json()).then(data => {
          document.getElementById('history-list').innerHTML = data.map(h => `<div class="history-item"><span>${h.text}</span><span style="color:#666">${h.time}</span></div>`).join('');
        });
    }

    let currentPhotoBase64 = "";
    function compressImage(input) {
      if (!input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX = 1200; let w = img.width, h = img.height;
          if (w > h) { if (w > MAX) { h *= MAX/w; w = MAX; } } else { if (h > MAX) { w *= MAX/h; h = MAX; } }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.8);
          document.getElementById('status').innerText = "📸 照片已就緒";
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    }
    window.onload = loadHistory;
    document.getElementById('type-selector').onchange = e => document.getElementById('split-group').style.display = (e.target.value==='墊付'?'flex':'none');
  </script>
</body>
</html>
